name: Generate Dashboard

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - run: npm run generate
        env:
          CLOUDABILITY_OPENTOKEN: ${{ secrets.CLOUDABILITY_OPENTOKEN }}
          CLOUDABILITY_ENVIRONMENT_ID: ${{ secrets.CLOUDABILITY_ENVIRONMENT_ID }}
      - uses: actions/upload-artifact@v3
        with:
          name: executive-dashboard
          path: output/executive_dashboard.html
